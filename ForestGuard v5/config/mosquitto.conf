# Mosquitto Configuration File

# General settings
listener 1883
allow_anonymous true

# Logging
log_dest stdout
log_type all
log_timestamp true

# Security (minimal for development)
allow_anonymous true

# Message persistence
persistence true
persistence_location ./

# Connection settings
max_connections -1
max_keepalive 300

# For WebSocket support (if needed in the future)
# listener 9001
# protocol websockets
